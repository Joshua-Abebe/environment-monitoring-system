services:
  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "${MQTT_PORT:-1883}:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 3 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 }).ok' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      HEALTHCHECK_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_initial_dbms_default__database: environmentmonitoring
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${HEALTHCHECK_PASSWORD} 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  subscriber:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MONGO_URI: ${MONGO_URI}
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python -m database.initialize_mysql
      && python -m subscriber.mqtt_subscriber"
    depends_on:
      mosquitto:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  publisher:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    # The fleet is now database-driven (tests/run_publishers.py reads
    # sensors from MySQL via get_all_sensors()), so the publisher needs
    # MySQL up and its tables/seed rows in place before it starts. Running
    # database.initialize_mysql here too (it's already idempotent --
    # CREATE TABLE IF NOT EXISTS + INSERT IGNORE) means the publisher
    # doesn't have to race the subscriber container for who seeds first.
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python -m database.initialize_mysql
      && python -m tests.run_publishers"
    depends_on:
      mosquitto:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MONGO_URI: ${MONGO_URI}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python -m streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501"
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
  neo4j_data:
  neo4j_logs:
